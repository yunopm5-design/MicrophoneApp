name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Bozuk tüm wrapper dosyalarını unutturan, resmi otomatik Gradle kurucu adımımız
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Sadece bu izni ekledim, 'Permission denied' hatasını bu satır çözecek
      - name: Make gradlew executable
        run: chmod +x gradlew

      # gradle wrapper komutunu doğrudan projede çalıştırırsak build.gradle dosyanız
      # okunmaya çalışılıyor ve içindeki eski syntax hataya sebep oluyor.
      # Bu yüzden boş bir klasörde wrapper dosyalarını üretip projeye kopyalıyoruz.
      - name: Regenerate Gradle Wrapper Jar
        run: |
          mkdir -p /tmp/wrapper-gen
          cd /tmp/wrapper-gen
          touch settings.gradle
          gradle wrapper --gradle-version 8.0
          cp gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/gradle/wrapper/gradle-wrapper.jar"

      - name: Clean Build
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/
        continue-on-error: true
